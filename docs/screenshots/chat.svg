<svg width="340" height="480" viewBox="0 0 340 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="popup-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Popup window -->
  <rect width="340" height="480" rx="12" fill="#1e1e2e" filter="url(#popup-shadow)"/>
  <rect width="340" height="480" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Header -->
  <text x="18" y="33" font-size="15" font-weight="700" fill="#cba6f7" font-family="-apple-system, BlinkMacSystemFont, sans-serif">✦ Clarify</text>
  <!-- Gear button -->
  <rect x="295" y="13" width="28" height="24" rx="6" fill="none" stroke="#313244" stroke-width="1"/>
  <text x="309" y="30" font-size="13" fill="#6c7086" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif">⚙</text>
  <!-- Header divider -->
  <line x1="0" y1="50" x2="340" y2="50" stroke="#313244" stroke-width="1"/>

  <!-- Welcome bubble (assistant) -->
  <rect x="12" y="62" width="252" height="52" rx="12" fill="#313244"/>
  <rect x="12" y="102" width="14" height="14" rx="0" fill="#313244"/>
  <text x="24" y="79" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Hello! Ask me anything, or highlight</text>
  <text x="24" y="95" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">text on any page for an explanation.</text>

  <!-- User message 1 -->
  <rect x="100" y="130" width="228" height="32" rx="12" fill="rgba(203,166,247,0.1)" stroke="rgba(203,166,247,0.22)" stroke-width="1"/>
  <rect x="314" y="150" width="14" height="14" fill="rgba(203,166,247,0.1)"/>
  <text x="116" y="150" font-size="12" fill="#cba6f7" font-family="-apple-system, BlinkMacSystemFont, sans-serif">What is machine learning?</text>

  <!-- AI response bubble -->
  <rect x="12" y="174" width="286" height="72" rx="12" fill="#313244"/>
  <rect x="12" y="234" width="14" height="14" fill="#313244"/>
  <text x="24" y="191" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Machine learning is a branch of AI where</text>
  <text x="24" y="207" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">systems learn from data to improve their</text>
  <text x="24" y="223" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">performance without explicit programming.</text>
  <text x="24" y="239" font-size="11.5" fill="#6c7086" font-family="-apple-system, BlinkMacSystemFont, sans-serif">...</text>

  <!-- User message 2 -->
  <rect x="96" y="264" width="232" height="32" rx="12" fill="rgba(203,166,247,0.1)" stroke="rgba(203,166,247,0.22)" stroke-width="1"/>
  <rect x="314" y="284" width="14" height="14" fill="rgba(203,166,247,0.1)"/>
  <text x="112" y="284" font-size="12" fill="#cba6f7" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Give me a real-world example</text>

  <!-- AI response 2 -->
  <rect x="12" y="308" width="274" height="56" rx="12" fill="#313244"/>
  <rect x="12" y="352" width="14" height="14" fill="#313244"/>
  <text x="24" y="325" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Netflix recommends shows based on your</text>
  <text x="24" y="341" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">watch history. Gmail filters spam. Both</text>
  <text x="24" y="357" font-size="11.5" fill="#cdd6f4" font-family="-apple-system, BlinkMacSystemFont, sans-serif">use ML models trained on past data.</text>

  <!-- Input divider -->
  <line x1="0" y1="398" x2="340" y2="398" stroke="#313244" stroke-width="1"/>

  <!-- Input field -->
  <rect x="12" y="410" width="276" height="34" rx="8" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="24" y="431" font-size="12" fill="#45475a" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Ask anything…</text>

  <!-- Send button -->
  <rect x="296" y="410" width="32" height="34" rx="8" fill="#cba6f7"/>
  <text x="312" y="432" font-size="15" fill="#1e1e2e" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif">→</text>
</svg>
